<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Annotator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <style>
    .image-tile {
      margin-bottom: 20px;
    }
    
    .tile-content {
      display: flex;
      gap: 15px;
    }
    
    .thumbnail-container {
      flex-shrink: 0;
    }
    
    .thumbnail {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 6px;
    }
    
    .annotation-container {
      flex-grow: 1;
    }
    
    .save-status {
      font-size: 0.8rem;
      color: #48c774;
    }
    
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .loading-spinner {
      background-color: white;
      padding: 30px;
      border-radius: 8px;
      text-align: center;
    }
    
    .empty-state {
      padding: 40px;
      text-align: center;
      color: #7a7a7a;
    }
    
    .tile-container {
      overflow-y: auto;
      max-height: calc(100vh - 250px);
    }
    
    .tile-container::-webkit-scrollbar {
      width: 8px;
    }
    
    .tile-container::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 4px;
    }
    
    .tile-container::-webkit-scrollbar-thumb {
      background: #c0c0c0;
      border-radius: 4px;
    }
    
    .tile-container::-webkit-scrollbar-thumb:hover {
      background: #a8a8a8;
    }
    
    .directory-selector {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <section class="section">
    <div class="container">
      <h1 class="title">Image Annotator</h1>
      
      <!-- Directory selector -->
      <div class="directory-selector">
        <label class="label">Select Image Directory</label>
        <div class="field has-addons">
          <div class="control is-expanded">
            <input type="text" id="directory-path" class="input" placeholder="/path/to/your/images">
          </div>
          <div class="control">
            <button class="button is-primary" id="scan-btn">
              <span class="icon"><i class="fas fa-search"></i></span>
              <span>Scan Directory</span>
            </button>
          </div>
          <div class="control">
            <button class="button is-danger" id="clear-btn" disabled>
              <span class="icon"><i class="fas fa-trash"></i></span>
              <span>Clear Images</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Image tiles container -->
      <div id="image-container" class="tile-container">
        <!-- Images will be loaded here -->
      </div>
    </div>
  </section>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay" style="display: none;">
    <div class="loading-spinner">
      <span class="icon is-large">
        <i class="fas fa-2x fa-spinner fa-spin"></i>
      </span>
      <p class="mt-3">Loading...</p>
    </div>
  </div>

  <script>
    // DOM elements
    const directoryPathInput = document.getElementById('directory-path');
    const scanBtn = document.getElementById('scan-btn');
    const clearBtn = document.getElementById('clear-btn');
    const imageContainer = document.getElementById('image-container');
    const loadingOverlay = document.getElementById('loading-overlay');

    // Current images data
    let currentImages = [];
    let currentDirectory = '';

    // Load existing images on page load
    document.addEventListener('DOMContentLoaded', async () => {
      await loadImages();
      
      // Event listeners
      scanBtn.addEventListener('click', handleScanDirectory);
      
      clearBtn.addEventListener('click', () => {
        currentDirectory = '';
        directoryPathInput.value = '';
        clearBtn.disabled = true;
        
        imageContainer.innerHTML = `
          <div class="empty-state">
            <p>No images yet. Enter a directory path and click "Scan Directory".</p>
          </div>`;
      });
    });

    // Handle directory scan
    async function handleScanDirectory() {
      let dirPath = directoryPathInput.value.trim();
      
      if (!dirPath) {
        alert('Please enter a directory path');
        return;
      }
      
      // Clean the path (remove quotes)
      dirPath = cleanPath(dirPath);
      
      if (!dirPath) {
        alert('Please enter a valid directory path');
        return;
      }
      
      showLoading(true);
      
      try {
        const response = await fetch('/api/scandir', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ directoryPath: dirPath })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          currentDirectory = data.directory;
          
          // Enable clear button
          clearBtn.disabled = false;
          
          currentImages = data.images;
          renderImageTiles(currentImages);
        } else {
          alert('Error: ' + data.error);
        }
      } catch (error) {
        console.error('Error scanning directory:', error);
        alert('Failed to scan directory');
      } finally {
        showLoading(false);
      }
    }

    // Clean path function (remove quotes)
    function cleanPath(dirPath) {
      if (!dirPath) return '';
      
      // Remove surrounding quotes (both single and double)
      let cleaned = dirPath.trim();
      if ((cleaned.startsWith('"') && cleaned.endsWith('"')) || 
          (cleaned.startsWith("'") && cleaned.endsWith("'"))) {
        cleaned = cleaned.slice(1, -1);
      }
      
      return cleaned;
    }

    // Load existing images and their annotations from server
    async function loadImages() {
      showLoading(true);
      
      try {
        const response = await fetch('/api/images');
        
        if (response.ok) {
          const data = await response.json();
          currentImages = data.images;
          renderImageTiles(currentImages);
        }
      } catch (error) {
        console.error('Error loading images:', error);
      } finally {
        showLoading(false);
      }
    }

    // Render image tiles
    function renderImageTiles(images) {
      if (images.length === 0) {
        imageContainer.innerHTML = `
          <div class="empty-state">
            <p>No images found. Enter a directory path and click "Scan Directory".</p>
          </div>`;
        return;
      }

      let html = '';
      
      images.forEach((item) => {
        // Use /image/ endpoint for full paths
        const imageUrl = `/image/${encodeURIComponent(item.fullPath)}`;
        
        // Get filename for display
        const fileName = item.image?.name || item.image;
        
        html += `
          <div class="tile is-child box image-tile" data-image="${encodeURIComponent(fileName)}" data-fullpath="${encodeURIComponent(item.fullPath || '')}">
            <div class="tile-content">
              <div class="thumbnail-container">
                <img src="${imageUrl}" alt="${fileName}" class="thumbnail" loading="lazy" onerror="console.error('Image failed to load:', this.src)">
              </div>
              <div class="annotation-container">
                <div class="level">
                  <div class="level-left">
                    <div class="level-item">
                      <strong>${fileName}</strong>
                    </div>
                  </div>
                  <div class="level-right">
                    <div class="level-item save-status"></div>
                  </div>
                </div>
                <textarea 
                  class="textarea annotation-text" 
                  placeholder="Enter annotation for this image..."
                  data-image="${encodeURIComponent(fileName)}"
                  data-fullpath="${encodeURIComponent(item.fullPath || '')}"
                >${escapeHtml(item.annotation || '')}</textarea>
              </div>
            </div>
          </div>`;
      });

      imageContainer.innerHTML = html;

      // Add event listeners to text areas
      document.querySelectorAll('.annotation-text').forEach(textarea => {
        textarea.addEventListener('blur', handleAnnotationBlur);
      });
    }

    // Handle annotation text area blur (save to server)
    async function handleAnnotationBlur(e) {
      const textarea = e.target;
      const imageFileEncoded = textarea.dataset.image;
      const fullPathEncoded = textarea.dataset.fullpath;
      const annotation = textarea.value;
      
      // Decode the filename
      const imageFile = decodeURIComponent(imageFileEncoded);
      
      // Get full path if available
      let directoryPath = currentDirectory;
      if (fullPathEncoded) {
        const fullPath = decodeURIComponent(fullPathEncoded);
        
        // Extract directory from full path using string manipulation
        if (fullPath) {
          const lastSlash = fullPath.lastIndexOf('/');
          if (lastSlash > -1) {
            directoryPath = fullPath.substring(0, lastSlash);
          }
        }
      }
      
      // Show saving indicator
      const saveStatus = textarea.previousElementSibling?.querySelector('.save-status');
      if (saveStatus) {
        saveStatus.textContent = 'Saving...';
        saveStatus.style.color = '#3273dc';
      }

      try {
        const response = await fetch('/api/annotations', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            directoryPath: directoryPath,
            imageFile: imageFile,
            annotation: annotation
          })
        });

        const data = await response.json();

        if (data.success) {
          // Show success indicator
          if (saveStatus) {
            saveStatus.textContent = 'Saved';
            setTimeout(() => {
              saveStatus.textContent = '';
            }, 2000);
          }
        } else {
          // Show error
          if (saveStatus) {
            saveStatus.textContent = 'Error saving';
            saveStatus.style.color = '#ff3860';
          }
        }
      } catch (error) {
        console.error('Error saving annotation:', error);
        
        // Show error
        if (saveStatus) {
          saveStatus.textContent = 'Error saving';
          saveStatus.style.color = '#ff3860';
        }
      }
    }

    // Show/hide loading overlay
    function showLoading(show) {
      if (show) {
        loadingOverlay.style.display = 'flex';
      } else {
        loadingOverlay.style.display = 'none';
      }
    }

    // Escape HTML to prevent XSS
    function escapeHtml(unsafe) {
      if (!unsafe) return '';
      return unsafe
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
