<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Annotator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
  <style>
    .image-tile {
      margin: 8px 8px 0 8px;
    }

    .thumbnail {
      border-radius: 5px;
      width: 150px !important;
      height: 150px !important;
      object-fit: cover;
    }

    .save-status {
      font-size: 0.8rem;
      color: #48c774;
    }

    .empty-state {
      padding: 40px;
      text-align: center;
      color: #7a7a7a;
    }

    .tile-container {
      overflow-y: auto;
      max-height: calc(100vh - 250px);
    }

    .tile-container::-webkit-scalebar {
      width: 8px;
    }

    .tile-container::-webkit-scrollbar {
      width: 8px;
    }

    .tile-container::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 4px;
    }

    .tile-container::-webkit-scrollbar-thumb {
      background: #c0c0c0;
      border-radius: 4px;
    }

    .tile-container::-webkit-scrollbar-thumb:hover {
      background: #a8a8a8;
    }

    /* New layout styles */
    .main-layout {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      margin-top: 20px;
    }

    .left-column {
      flex: 2;
      overflow-y: auto;
      max-height: calc(100vh - 250px);
    }

    .right-column {
      flex: 1;
      overflow-y: auto;
      max-height: calc(100vh - 250px);
      padding: 10px;
      background-color: #f9f9f9;
      border-radius: 8px;
    }

    .directory-selector {
      margin-bottom: 2 0px;
    }

    .mode-controls {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 20px;
    }

    .keyword-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .keyword-chip {
      background-color: #f5f5f5;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      margin: 2px;
    }

    .keyword-chip.highlighted {
      background-color: #70db70;
      color: white;
    }

    .keyword-chip-count {
      background-color: #dbdbdb;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      margin-right: -8px;
    }

    .keyword-chip.highlighted .keyword-chip-count {
      background-color: white;
      color: black;
    }

    /* Image Preview Overlay */
    #image-preview-overlay {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      display: none;
      max-width: 250px;
      max-height: 250px;
      border: 3px solid white;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      background-color: #fff;
      object-fit: contain;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <section class="section">
    <div class="container">
      <h1 class="title">Image Annotator</h1>

      <!-- Mode switcher controls -->
      <div id="mode-controls" class="mode-controls">
        <!-- Initial mode: Directory selector -->
        <div id="initial-mode">
          <label class="label">Select Image Directory</label>
          <div class="field has-addons">
            <div class="control is-expanded">
              <input type="text" id="directory-path" class="input" placeholder="/path/to/your/images">
            </div>
            <div class="control">
              <button class="button is-primary" id="scan-btn">
                <span class="icon"><i class="fas fa-search"></i></span>
                <span>Scan Directory</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Main content area with two columns -->
      <div class="main-layout">
        <!-- Left Column: Image tiles container (2/3 width) -->
        <div id="image-container" class="tile-container left-column">
          <!-- Images will be loaded here -->
        </div>

        <!-- Right Column: Annotation mode (1/3 width) -->
        <div id="annotation-mode" class="right-column" style="display: none;">
          <button class="button is-danger is-fullwidth mb-4" id="clear-btn">
            <span class="icon"><i class="fas fa-trash"></i></span>
            <span>Clear Images</span>
          </button>

          <!-- Keyword chips container -->
          <div id="keyword-chips-container">
            <label class="label">Keywords</label>
            <div id="keyword-chips" class="keyword-chips">
              <!-- Keywords will be rendered here -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay" style="display: none;">
    <div class="loading-spinner">
      <span class="icon is-large">
        <i class="fas fa-2x fa-spinner fa-spin"></i>
      </span>
      <p class="mt-3">Loading...</p>
    </div>
  </div>

  <!-- Image Preview Overlay -->
  <img id="image-preview-overlay" src="" alt="Preview" />

  <script src="app.js"></script>
</body>

</html>
