<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Annotator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css" />
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet">
  <style>
    .image-tile:first-of-type {
      margin-top: 8px;
    }

    .image-tile {
      margin: 0 8px 0 8px;
    }

    .image-tile:last-of-type {
      margin-bottom: 8px;
    }

    .thumbnail {
      border-radius: 5px;
      width: 150px !important;
      height: 150px !important;
      object-fit: cover;
    }

    .save-status {
      font-size: 0.8rem;
      color: #48c774;
    }

    .empty-state {
      padding: 40px;
      text-align: center;
      color: #7a7a7a;
    }

    .tile-container {
      overflow-y: auto;
      max-height: calc(100vh - 250px);
    }

    .tile-container::-webkit-scalebar {
      width: 8px;
    }

    .tile-container::-webkit-scrollbar {
      width: 8px;
    }

    .tile-container::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 4px;
    }

    .tile-container::-webkit-scrollbar-thumb {
      background: #c0c0c0;
      border-radius: 4px;
    }

    .tile-container::-webkit-scrollbar-thumb:hover {
      background: #a8a8a8;
    }

    /* New layout styles */
    .main-layout {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      margin-top: 20px;
    }

    .left-column {
      flex: 2;
      overflow-y: auto;
      max-height: calc(100vh - 250px);
      background-color: #f9f9f9;
    }

    .right-column {
      flex: 1;
      overflow-y: auto;
      max-height: calc(100vh - 250px);
      padding: 10px;
      border-radius: 8px;
    }

    .directory-selector {
      margin-bottom: 2 0px;
    }

    .mode-controls {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 20px;
    }

    .keyword-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .keyword-chip {
      background-color: #f5f5f5;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      margin: 2px;
    }

    .keyword-chip.highlighted {
      background-color: #70db70;
      color: white;
    }

    .keyword-chip-count {
      background-color: #dbdbdb;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      margin-right: -8px;
    }

    .keyword-chip.highlighted .keyword-chip-count {
      background-color: white;
      color: black;
    }

    /* Image Preview Overlay */
    #image-preview-overlay {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      display: none;
      max-width: 300px;
      max-height: 300px;
      border: 3px solid white;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      background-color: #fff;
      object-fit: contain;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <section class="section">
    <div class="container">
      <h1 class="title">Image Annotator</h1>

      <!-- Mode switcher controls -->
      <div id="mode-controls" class="mode-controls">
        <!-- Initial mode: Directory selector -->
        <div id="initial-mode">
          <label class="label">Select Image Directory</label>
          <div class="field has-addons">
            <div class="control is-expanded">
              <input type="text" id="directory-path" class="input" placeholder="/path/to/your/images">
            </div>
            <div class="control">
              <button class="button is-primary" id="scan-btn">
                <span class="icon"><i class="mdi mdi-image-search"></i></span>
                <span>Scan Directory</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Main content area with two columns -->
      <div class="main-layout">
        <!-- Left Column: Image tiles container (2/3 width) -->
        <div id="image-container" class="tile-container left-column">
          <!-- Images will be loaded here -->
        </div>

        <!-- Right Column: Annotation mode (1/3 width) -->
        <div id="annotation-mode" class="tile-container right-column" style="display: none;">
          <!-- Tabs -->
          <div class="tabs is-boxed">
            <ul>
              <li class="is-active">
                <a>
                  <span class="icon is-small">
                    <i class="mdi mdi-playlist-edit" aria-hidden="true"></i>
                  </span>
                  <span>Keywords</span>
                </a>
              </li>
              <li>
                <a>
                  <span class="icon is-small">
                    <i class="mdi mdi-tooltip-image" aria-hidden="true"></i>
                  </span>
                  <span>LLM Annotation</span>
                </a>
              </li>
            </ul>
          </div>

          <!-- Tab content containers -->
          <div id="keyword-tab-content">
            <!-- Filtering Section -->
            <div class="filtering-section mb-5">
              <label class="label">Filter by keywords</label>

              <!-- Tags Container -->
              <div id="filtering-tags-container" class="field is-grouped is-grouped-multiline mb-3">
                <!-- Tags rendered here -->
              </div>

              <!-- Dropdown and Button -->
              <div class="field is-grouped">
                <div class="control" style="width:50%;">
                  <div class="select">
                    <select id="filter-keyword-dropdown">
                      <option value="">Select a keyword...</option>
                      <!-- Options populated dynamically -->
                    </select>
                  </div>
                </div>
                <div class="control">
                  <button class="button is-primary" id="apply-filter-btn">Apply filter</button>
                </div>
              </div>
            </div>

            <!-- Existing Chips -->
            <div id="keyword-chips-container">
              <label class="label">Keywords</label>
              <div id="keyword-chips" class="keyword-chips">
                <!-- Keywords will be rendered here -->
              </div>
            </div>
          </div>

          <div id="llm-tab-content" style="display: none;">
            <p class="mb-4 has-text-grey">Automatic annotations will use local LM Studio server.</p>
            <div class="field">
              <label class="label">LM Studio local server endpoint</label>
              <div class="control">
                <input class="input" type="text" id="llm-endpoint" value="http://localhost:1234">
              </div>
            </div>
            <div class="field mt-4">
              <div class="control">
                <button class="button is-primary" id="get-models-btn">Get available models</button>
              </div>
            </div>
            <div id="llm-models-list" class="mt-4"></div>

            <div id="llm-annotation-section" class="mt-4" style="display: none;">
              <h3 class="title is-5">Automatic annotations</h3>
              <div class="field">
                <div class="control">
                  <label class="radio">
                    <input type="radio" name="llm-annotation-mode" value="add" checked>
                    Add LLM text to existing annotations
                  </label>
                </div>
                <div class="control">
                  <label class="radio">
                    <input type="radio" name="llm-annotation-mode" value="replace">
                    Replace existing annotations with LLM text
                  </label>
                </div>
                <div class="control">
                  <label class="radio">
                    <input type="radio" name="llm-annotation-mode" value="skip">
                    Only add empty annotations
                  </label>
                </div>
              </div>
              <div class="field">
                <div class="control">
                  <label class="radio">
                    <input type="radio" name="llm-annotation-scope" value="all" checked>
                    Start from first image
                  </label>
                </div>
                <div class="control">
                  <label class="radio">
                    <input type="radio" name="llm-annotation-scope" value="forward">
                    Start from selected image
                  </label>
                </div>
                <div class="control">
                  <label class="radio">
                    <input type="radio" name="llm-annotation-scope" value="selected">
                    Annotate only single (selected) image
                  </label>
                </div>
              </div>
              <div class="field">
                <label class="label">Prompt <span style="font-weight: normal;">(optional)</span></label>
                <div class="control">
                  <input class="input" type="text" id="llm-prompt" value="">
                </div>
              </div>
              <div class="field is-grouped">
                <div class="control">
                  <button class="button is-primary" id="start-annotating-btn">Start annotating images</button>
                </div>
                <div class="control">
                  <button class="button is-danger" id="stop-annotating-btn" style="display: none;">Stop
                    annotating</button>
                </div>
              </div>
              <div class="field">
                <label class="label" id="llm-annotation-progress-label" style="display: none;">Progress</label>
                <p class="help" id="llm-annotation-progress" style="display: none;">Annotating 0 of 0...</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay" style="display: none;">
    <div class="loading-spinner">
      <span class="icon is-large">
        <i class="mdi mdi-hourglass"></i>
      </span>
      <p class="mt-3">Loading...</p>
    </div>
  </div>

  <!-- Image Preview Overlay -->
  <img id="image-preview-overlay" src="" alt="Preview" />

  <script src="app.js"></script>
</body>

</html>
